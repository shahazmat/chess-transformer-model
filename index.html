<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chess-gpt</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Crect width='60' height='60' rx='10' fill='%232e2921'/%3E%3Cpath d='M19,48 h22 v-4 h-22 Z M23,44 V30 A7,7 0 0 1 37,30 V44 Z' fill='%23f6f1e4'/%3E%3C/svg%3E">
</head>
<body>
  <header>
    <h1>chess-gpt</h1>
    <p>next-token chess — skeleton harness, currently running a mock model</p>
  </header>

  <main class="layout">
    <div class="board-area">
      <div id="board-wrap">
        <svg id="board" role="img" aria-label="chessboard"></svg>
        <div id="promo" hidden>
          <div class="promo-box">
            <p>Promote to</p>
            <div class="promo-pieces">
              <button data-piece="q" aria-label="queen"></button>
              <button data-piece="r" aria-label="rook"></button>
              <button data-piece="b" aria-label="bishop"></button>
              <button data-piece="n" aria-label="knight"></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <aside class="side">
      <section id="setup">
        <h2>New game</h2>
        <div class="field">
          <label>Play as</label>
          <div class="seg">
            <button id="pick-white" class="active" type="button">White</button>
            <button id="pick-black" type="button">Black</button>
          </div>
        </div>
        <div class="field">
          <label for="rating">Your rating <span class="opt">optional</span></label>
          <input id="rating" type="number" min="100" max="4000" step="1" placeholder="e.g. 1500">
        </div>
        <div class="field">
          <label for="site">Where that rating is from</label>
          <select id="site">
            <option value="">—</option>
            <option>lichess</option>
            <option>chess.com</option>
            <option>FIDE</option>
            <option>USCF</option>
            <option value="other">other…</option>
          </select>
          <input id="site-other" type="text" placeholder="site name" hidden>
        </div>
        <button id="start" class="primary" type="button">Start game</button>
      </section>

      <section id="play" hidden>
        <div id="status" class="status"></div>
        <div id="moves" aria-label="move list"></div>
        <details id="inspector" open>
          <summary>Model output</summary>
          <div id="inspector-body"></div>
        </details>
        <div class="row">
          <button id="new-game" type="button">New game</button>
          <button id="copy-pgn" type="button">Copy PGN</button>
        </div>
      </section>
    </aside>
  </main>

  <footer>
    <p>plug your model in via <code>js/mock-model.js</code> — see the README for the contract</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
